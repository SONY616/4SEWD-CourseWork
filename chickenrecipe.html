  <title>Grilled Chicken</title>

<body>
  <h1>Grilled Chicken</h1>
  <img src="https://iowagirleats.com/wp-content/uploads/2025/06/Simple-Grilled-Chicken-Thighs-iowagirleats-Featured.jpg" alt="Grilled Chicken" width="100px" height="100px">
  <p><strong>Description:</strong> Juicy grilled chicken thighs.</p>
  <h3>Ingredients</h3>
  <ul>
    <li>Chicken thighs</li>
    <li>Salt</li>
    <li>Pepper</li>
    <li>Olive oil</li>
  </ul>
  <h3>Instructions</h3>
  <p>Season chicken with salt and pepper, brush with oil, and grill until cooked through.</p>
