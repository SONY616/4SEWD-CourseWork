<!-- add-recipe.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Recipe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      color: #ff6f61;
    }

    form {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #555;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .ingredients {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .ingredients input,
    .ingredients select {
      flex: 1;
    }

    .ingredients button {
      background: #ff6f61;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .ingredients button:hover {
      background: #ff6f61;
    }

    button[type="submit"] {
      margin-top: 20px;
      width: 100%;
      background: #ff6f61;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #ff6f61;
    }
  </style>
</head>
<body>
  <section class="page">
    <h2>Add Recipe</h2>
    <form>
      <label>Recipe Name</label>
      <input type="text" required>
      
      <label>Description</label>
      <textarea required></textarea>
      
      <label>Instructions</label>
      <textarea required></textarea>
      
      <label>Ingredients</label>
      <div class="ingredients">
        <input type="text" placeholder="Ingredient Name">
        <input type="number" min="1" placeholder="Quantity">
        <select>
          <option>grams</option>
          <option>ml</option>
          <option>pieces</option>
        </select>
        <button type="button">Add Ingredient</button>
      </div>
      
      <label>Upload Image</label>
      <input type="file" accept="image/*" required>
      
      <button type="submit">Save Recipe</button>
    </form>
  </section>
</body>
</html>
