<!-- ingredients.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ingredients</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      color: #ff6f61;
    }

    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #ff6f61;
      color: white;
      font-weight: bold;
    }

    tr:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>
  <section class="page">
    <h2>Ingredients</h2>
    <table>
      <tr><th>Name</th><th>Unit</th></tr>
      <tr><td>Flour</td><td>grams</td></tr>
      <tr><td>Milk</td><td>ml</td></tr>
      <tr><td>Eggs</td><td>pieces</td></tr>
    </table>
  </section>
</body>
</html>
