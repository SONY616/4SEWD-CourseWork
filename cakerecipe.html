<!DOCTYPE html>

<head>

  <title>Chocolate Cake</title>
</head>
<body>
  <h1>Chocolate Cake</h1>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbBHSHr8vQTCyFpRFDvF83cSvdA0ImUCiUFzI1igDf5Fo5ELR_qvCrH26a&s=10" alt="Chocolate Cake" width="100px" height="100px">
  <p><strong>Description:</strong> A rich and moist chocolate cake.</p>
  <h3>Ingredients</h3>
  <ul>
    <li>2 cups flour</li>
    <li>2 cups sugar</li>
    <li>1 cup cocoa powder</li>
    <li>3 large eggs</li>
    <li>2 tsp vanilla extract</li>
  </ul>
  <h3>Instructions</h3>
  <p>Mix dry and wet ingredients, bake at 180°C for 30 minutes. Let cool and frost.</p>
</body>
</html>
